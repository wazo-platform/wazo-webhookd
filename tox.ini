[tox]
env_list = py311, linters
no_package = false

[testenv]
commands =
    pytest --junitxml=unit-tests.xml --cov=wazo_webhookd --cov-report term --cov-report xml:coverage.xml wazo_webhookd
deps =
    -rrequirements.txt
    -rtest-requirements.txt
    pytest-cov

[testenv:linters]
base_python = python3.11
skip_install = true
deps = pre-commit
commands = pre-commit run --all-files

[testenv:integration]
base_python = python3.11
use_develop = true
deps =
    setuptools>=70
change_dir = integration_tests
pass_env =
    INTEGRATION_TEST_TIMEOUT
    TEST_LOGS
    WAZO_TEST_DOCKER_LOGS_DIR
    WAZO_TEST_DOCKER_LOGS_ENABLED
    WAZO_TEST_DOCKER_OVERRIDE_EXTRA
    WAZO_TEST_NO_DOCKER_COMPOSE_PULL
commands_pre =
    pip install -r test-requirements-for-tox.txt
    pip install -e plugins/sentinel_client
commands =
    make test-setup
    pytest -v {posargs}
allowlist_externals =
    make
    sh
    pip
